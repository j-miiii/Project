# Mosquitto 설정 파일 (v2.x)

# 네트워크 설정
listener 1883 0.0.0.0
protocol mqtt

# WebSocket 지원 (웹 클라이언트용)
listener 9001 0.0.0.0
protocol websockets

# 익명 접속 허용 (개발 환경)
allow_anonymous true

# 로깅 설정
log_dest stdout
log_type all

# 지속성 설정
persistence true
persistence_location ./mosquitto_data/

# 메시지 크기 제한 (바이트) - 0은 제한 없음을 의미하지만 유효하지 않으므로 기본값 사용

# 클라이언트 연결 제한
max_connections -1

# QoS 레벨별 최대 메시지 수
max_inflight_messages 20
max_queued_messages 1000
